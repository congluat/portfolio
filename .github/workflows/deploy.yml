name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Publish build to repository root
        run: |
          cp dist/index.html index.html
          rm -rf assets
          cp -r dist/assets assets
          rm -rf logos
          cp -r dist/logos logos
          cp dist/favicon.svg favicon.svg
          cp dist/.nojekyll .nojekyll

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'Deploy site [skip ci]'
          file_pattern: 'index.html assets logos favicon.svg .nojekyll'
